name: Get last successful workflow run

on:
  workflow_dispatch:

jobs:
    workflow-runs:
        runs-on: ubuntu-latest
        steps:
            # - name: Dispatch chart tagger event
            #   run: |
            #     curl -L \
            #         -H "Accept: application/vnd.github+json" \
            #         -H "Authorization: Bearer ${{ secrets.CLASSIC_PAT_CROSS_REPO }}" \
            #         -H "X-GitHub-Api-Version: 2026-03-10" \
            #         https://api.github.com/repos/vkirankumar/portal-glow-mock/actions/workflows/deploy-to-prod.yaml/runs

            - name: Get last successful commit hash
              id: get_last_success
              uses: actions/github-script@v7
              with:
                 script: |
                     const { data: runs } = await github.rest.actions.listWorkflowRuns({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        workflow_id: 'deploy-to-prod.yaml',
                        status: 'success',
                        per_page: 1
                     });

                     console.log( `Total successful runs: ${runs.total_count}` );
                     if (runs.workflow_runs.length > 0) {
                        const lastSuccessfulRun = runs.workflow_runs[0];
                        console.log(`Last successful run commit hash: ${lastSuccessfulRun.head_sha}`);
                        core.setOutput("last_success_commit", lastSuccessfulRun.head_sha);
                     } else {
                        console.log('No successful runs found for the specified workflow.');
                     }
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0  # Fetch all history for accurate git diff
            - name: Get commit differences
              run: |
                    git fetch --all
                    git diff ${{ github.sha }} ${{ steps.get_last_success.outputs.last_success_commit }} --name-only
